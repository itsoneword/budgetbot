services:
  postgres:
    image: postgres:15-alpine
    container_name: budgetbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: budgetbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgetbot_dev_pass}
      POSTGRES_DB: budgetbot
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      # Schema is applied by alembic from the bot container entrypoint (T-005),
      # not via docker-entrypoint-initdb.d anymore.
    ports:
      - "5432:5432"  # Expose for local development; remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetbot -d budgetbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  budgetbot:
    build: .
    container_name: budgetbot-container
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://budgetbot:${POSTGRES_PASSWORD:-budgetbot_dev_pass}@postgres:5432/budgetbot
    volumes:
      # Persist user data (read-only during migration, then can remove)
      - ./user_data:/app/user_data
      # Claude CLI + subscription OAuth credentials for /ask (T-018), read-only.
      # Host ~/.claude is mounted as a DIRECTORY, not the credentials file alone:
      # the CLI refreshes tokens by atomic rename, and a single-file bind mount
      # keeps pointing at the deleted pre-refresh inode (expired token).
      # entrypoint.sh symlinks /root/.claude/.credentials.json into this mount.
      - /home/cleversol/.local/share/claude:/home/cleversol/.local/share/claude:ro
      - /home/cleversol/.local/bin/claude:/usr/local/bin/claude:ro
      - /home/cleversol/.claude:/host-claude:ro
      # Whisper weights for voice input (T-019) — host HF cache already holds
      # faster-whisper-small (shared with Devvybot); rw so HF can write lock files.
      - /home/cleversol/.cache/huggingface:/root/.cache/huggingface
    # Liveness (T-011): a JobQueue heartbeat touches /tmp/budgetbot-heartbeat
    # every 60s after a successful SELECT 1 (src/health.py). Stale/missing file
    # (os.stat raises -> exit 1) = unhealthy. start_period covers alembic
    # upgrade + slow first boot. Note: restart:unless-stopped does NOT act on
    # health — unhealthy is a signal for `docker ps`/deploys (auto-heal: T-012).
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys,time; sys.exit(0 if time.time()-os.stat('/tmp/budgetbot-heartbeat').st_mtime < 180 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
