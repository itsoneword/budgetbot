# Alembic configuration for BudgetBot.
# Connection URL comes from the DATABASE_URL env var (see env.py) — do not set sqlalchemy.url here.

[alembic]
script_location = %(here)s/infrastructure/database/alembic
# Template for new revision files: 0003_slug.py style via `alembic revision -m "slug" --rev-id 0003`
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
